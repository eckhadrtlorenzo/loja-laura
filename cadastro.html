<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <title>Cadastro - Good Day</title>
</head>
<body>
    <header></header>

    <main>
        <div class="cadastro1">
            <div class="cadastro2">
                <h2>Criar Conta</h2>
                <p class="subtitulo">Junte-se ao clube Good Day!</p>

                <form>
                    <div class="campo">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" placeholder="Seu nome aqui">
                    </div>

                    <div class="campo">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="exemplo@email.com">
                    </div>

                    <div class="campo">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="No mínimo 6 caracteres">
                    </div>

                    <button type="button" class="btn-cadastrar">Cadastrar</button>
                </form>

                <div class="rodape">
                    <p>Já tem uma conta? <a href="">Faça Login</a></p>
                    <a href="index.html" class="link-voltar">Voltar para a Loja</a>
                </div>
            </div>
        </div>
    </main>

    <footer></footer>
</body>
</html>
