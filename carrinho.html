<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="carrinho.css">
    <title>carrinho.com</title>
</head>
<body>
    <header></header>

    <main>
        <div class="dentro-carrinho">
            <h1 class="titulo-carrinho">Seu Carrinho:</h1>

            <div class="carrinho-corpo">
                <section class="lista-produtos">
                    <div class="card-item">
                        <img src="img/bombom de morango.jpg" alt="Produto">
                        <div class="info-item">
                            <h3>Matcha Vibes</h3>
                            <p class="categoria">Bebida Cremosa</p>
                        </div>
                        <div class="qtd-item">
                            <p>Qtd: 1</p>
                        </div>
                        <p class="preco-item">R$ 24,00</p>
                        <button class="remover">x</button>
                    </div>
                </section>

                <section class="resumo-pedido">
                    <h3>Resumo</h3>
                    <div class="linha-resumo">
                        <p>Subtotal</p>
                        <p>R$ 24,00</p>
                    </div>
                    <div class="linha-resumo">
                        <p>Frete</p>
                        <p class="gratis">Grátis</p>
                    </div>
                    <div class="linha-resumo total">
                        <p>Total</p>
                        <p>R$ 24,00</p>
                    </div>
                    <button class="finalizar">Finalizar Compra</button>
                    <a href="index.html" class="link-voltar">Continuar Comprando</a>
                </section>
            </div>
        </div>
    </main>

    <aside></aside>
    <footer></footer>
</body>
</html>
